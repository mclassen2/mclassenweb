<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    table, th, td {
      border: 1px solid black;
      border-collapse: collapse;
    }
    
    tr:nth-child(even) {
      background-color: rgba(150, 212, 212, 0.4);
    }
    .container {
      width: 100%;
    }

    .row {
      display: flex;
      width: 100%;
    }
    
    .chart-container {
      width: 100%;
      height: 480px;
      border: 1px solid black;   /* 👈 border here */
      padding: 10px;             /* space inside border */
      box-sizing: border-box;    /* keeps width clean */
      background-color: #fff;    /* optional */
    }
    .chart-container.half {
      width: 50%;
      border: 1px solid black;   /* 👈 border here */
      padding: 10px;             /* space inside border */
      box-sizing: border-box;    /* keeps width clean */
      background-color: #fff;    /* optional */
    }
    </style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <script src="../Chart.js/4.5.1/dist/chart.umd.js"></script>
  <title>Year 2020 Rain Fall</title>
</head>
<body>
  <table>
    <tbody>
      <table style="width: 100%; font-size:20px;">
        <div class="row">
          <div class="chart-container">
            <canvas id="chartOne"></canvas>
          </div>
        </div>
        <div class="row">
          <div class="chart-container half">
            <canvas id="chartTwo"></canvas>
          </div>
          <div class="chart-container half">
            <canvas id="chartthree"></canvas>
          </div>
        </div>
        <script>
        new Chart(document.getElementById("chartOne"), {
          type: 'bar',
          data: {
            labels: ["Jan 21","Jan 25","Feb 1","Feb 5","Feb 6","Feb 11","Feb 19","Feb 29","Mar 3","Mar 12","Mar 16","Mar 24","Apr 4","Apr 6","Apr 26","May 3","May 4","May 7","May 8","May 18","May 21","May 22","May 26","May 27","May 31","June 3","June 6","June 7","June 11","June 13","June 14","June 15","June 17","June 21","June 23","June 24","June 27","June 29","June 30","July 1","July 2","July 4","July 5","July 7","July 8","July 9","July 10","July 12","July 13","July 16","July 19","July 22","July 23","July 30","July 31","Aug 3","Aug 7","Aug 11","Aug 20","Aug 22","Aug 24","Aug 26","Sept 2","Sept 6","Sept 7","Oct 10","Oct 20","Oct 26","Oct 30","Nov 5","Nov 10","Nov 12","Nov 20","Nov 21","Nov 25","Nov 27"],
            datasets: [{
              data: [4.1,2.6,1.3,1,1.2,3.5,0.6,0.7,1.1,1.2,0.5,0.6,1.2,1.4,1.4,8.1,12,1.7,2.7,0.8,30.5,8.4,2.2,0.6,9.5,2.5,2.6,18.2,0.5,7.8,16.1,5.7,0.9,2.6,0.6,1.8,1.9,2.4,23.4,15,1.6,1.1,0.9,3.6,8,6.3,0.6,1.5,0.9,5.5,0.7,6.6,7.2,0.5,0.9,9.5,10.2,12.7,10.2,9.3,2.9,4.2,4.7,2.4,0.5,1.5,0.9,0.9,1.9,2.6,0.5,1,0.8,0.8,2,0.6],
              label: "mm",
              borderColor: "#428df5",
               backgroundColor: "#428df5",
              fill: false
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              x: {
                display: true,
                title: {
                  display: true,
                  text: 'Date',
                  color: '#911',
                  font: {
                    family: 'Comic Sans MS',
                    size: 20,
                    weight: 'bold',
                    lineHeight: 1.2,
                  },
                  padding: {top: 20, left: 0, right: 0, bottom: 0}
                }
              },
              y: {
                display: true,
                title: {
                  display: true,
                  text: 'Millimeters',
                  color: '#911',
                  font: {
                    family: 'Comic Sans MS',
                    size: 20,
                    weight: 'bold',
                    lineHeight: 1.2
                  }
                }
              }
            },
            interaction: {
              intersect: false,
              mode: 'index',
            },
            plugins:{
              title: {
                display: true,
                text: 'Daily 2020 Rain Fall (in Millimeters)',
                color: 'black',
                font: {
                  family: 'Comic Sans MS',
                  size: 20,
                  weight: 'bold',
                  lineHeight: 1.2,
                }
              },
              tooltip: {
                titleFont: {
                  size: 20,
                },
                bodyFont: {
                  size: 20,
                },
                bodyAlign: 'left'
              }
            }
          }
        });
      new Chart(document.getElementById("chartTwo"), {
          type: 'bar',
          data: {
            labels: ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],
            datasets: [{

              borderColor: "blue",

              fill: false
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            x: {
              display: true,
              title: {
                display: true,
                text: 'Monthly',
                color: '#911',
                font: {
                  family: 'Comic Sans MS',
                  size: 20,
                  weight: 'bold',
                  lineHeight: 1.2,
                },
                padding: {top: 20, left: 0, right: 0, bottom: 0}
              }
            },
            y: {
              display: true,
              title: {
                display: true,
                text: 'Millimeters',
                color: '#911',
                font: {
                  family: 'Comic Sans MS',
                  size: 20,
                  weight: 'bold',
                  lineHeight: 1.2
                }
              }
            }
          },
          interaction: {
            intersect: false,
            mode: 'index',
          },
          plugins:{
            title: {
              display: true,
              text: 'Monthly 2020 Rain Fall (in Millimeters)',
              color: 'black',
              font: {
                family: 'Comic Sans MS',
                size: 20,
                weight: 'bold',
                lineHeight: 1.2,
              }
            },
            tooltip: {
              titleFont: {
                size: 20,
              },
              bodyFont: {
                size: 20,
              },
              bodyAlign: 'left'
            }
          }
        }
      });
      new Chart(document.getElementById("chartthree"), {
          type: 'bar',
          data: {
            labels: ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],
            datasets: [{ 
              data: [3,6,5,4,11,17,18,7,5,8,8,2],
              label: "Day",
              borderColor: "#570185",
              backgroundColor: "#570185",
              fill: false
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            x: {
              display: true,
              title: {
                display: true,
                text: 'Monthly',
                color: '#911',
                font: {
                  family: 'Comic Sans MS',
                  size: 20,
                  weight: 'bold',
                  lineHeight: 1.2,
                },
                padding: {top: 20, left: 0, right: 0, bottom: 0}
              }
            },
            y: {
              display: true,
              title: {
                display: true,
                text: 'Day',
                color: '#911',
                font: {
                  family: 'Comic Sans MS',
                  size: 20,
                  weight: 'bold',
                  lineHeight: 1.2
                }
              }
            }
          },
          interaction: {
            intersect: false,
            mode: 'index',
          },
          plugins:{
            title: {
              display: true,
              text: 'Count Day of Monthly',
              color: 'black',
              font: {
                family: 'Comic Sans MS',
                size: 20,
                weight: 'bold',
                lineHeight: 1.2,
              }
            },
            tooltip: {
              titleFont: {
                size: 20,
              },
              bodyFont: {
                size: 20,
              },
              bodyAlign: 'left'
            }
