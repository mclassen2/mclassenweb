<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    table, th, td {
      border: 1px solid black;
      border-collapse: collapse;
    }
    
    tr:nth-child(even) {
      background-color: rgba(150, 212, 212, 0.4);
    }
    .container {
      width: 100%;
    }

    .row {
      display: flex;
      width: 100%;
    }
    
    .chart-container {
      width: 100%;
      height: 480px;
      border: 1px solid black;   /* 👈 border here */
      padding: 10px;             /* space inside border */
      box-sizing: border-box;    /* keeps width clean */
      background-color: #fff;    /* optional */
    }
    .chart-container.half {
      width: 50%;
      border: 1px solid black;   /* 👈 border here */
      padding: 10px;             /* space inside border */
      box-sizing: border-box;    /* keeps width clean */
      background-color: #fff;    /* optional */
    }
    </style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <script src="../Chart.js/4.5.1/dist/chart.umd.js"></script>
  <title>Year 2018 Rain Fall</title>
</head>
<body>
  <table>
    <tbody>
      <table style="width: 100%; font-size:20px;">
        <div class="row">
          <div class="chart-container">
            <canvas id="chartOne"></canvas>
          </div>
        </div>
        <div class="row">
          <div class="chart-container half">
            <canvas id="chartTwo"></canvas>
          </div>
          <div class="chart-container half">
            <canvas id="chartthree"></canvas>
          </div>
        </div>
        <script>
        new Chart(document.getElementById("chartOne"), {
          type: 'bar',
          data: {
            labels: ["May 14","May 16","May 17","May 24","May 27","May 30","June 1","June 4","June 10","June 11","June 15","June 22","June 30","July 3","July 7","July 9","July 10","July 18","July 19","July 20","July 21","July 22","July 30","Aug 1","Aug 3","Aug 4","Aug 11","Aug 12","Aug 17","Aug 24","Aug 26","Aug 29","Aug 30","Aug 31","Sept 1","Sept 3","Sept 8","Sept 10","Sept 11","Sept 12","Sept 13","Sept 15","Sept 16","Sept 21","Sept 22","Sept 23","Sept 24","Sept 26","Oct 7","Oct 11","Oct 12","Oct 28","Oct 31","Nov 1","Nov 3","Nov 4","Nov 9","Nov 14","Nov 15","Nov 18","Dec 9","Dec 10"],
            datasets: [{
              data: [1.8,1.2,18.6,2.3,0.5,5.2,4.2,1.6,20.7,7.8,3.4,2.2,0.7,0.6,7,0.7,11.1,8.9,17.6,2.2,2.3,1.3,0.6,7.6,3.2,9.3,2.4,11.1,5.6,4.3,1.9,2.1,8.7,0.5,3.7,2.9,0.9,1.7,7.2,9.6,2.7,8.9,7.1,3.8,0.8,4.4,1,1.1,0.8,1.4,9.2,0.9,0.8,0.5,7.3,1.1,0.7,1.7,2.3,2.8,0.7,2.9],
              label: "mm",
              borderColor: "#428df5",
               backgroundColor: "#428df5",
              fill: false
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              x: {
                display: true,
                title: {
                  display: true,
                  text: 'Date',
                  color: '#911',
                  font: {
                    family: 'Comic Sans MS',
                    size: 20,
                    weight: 'bold',
                    lineHeight: 1.2,
                  },
                  padding: {top: 20, left: 0, right: 0, bottom: 0}
                }
              },
              y: {
                display: true,
                title: {
                  display: true,
                  text: 'Millimeters',
                  color: '#911',
                  font: {
                    family: 'Comic Sans MS',
                    size: 20,
                    weight: 'bold',
                    lineHeight: 1.2
                  }
                }
              }
            },
            interaction: {
              intersect: false,
              mode: 'index',
            },
            plugins:{
              title: {
                display: true,
                text: 'Daily 2018 Rain Fall (in Millimeters)',
                color: 'black',
                font: {
                  family: 'Comic Sans MS',
                  size: 20,
                  weight: 'bold',
                  lineHeight: 1.2,
                }
              },
              tooltip: {
                titleFont: {
                  size: 20,
                },
                bodyFont: {
                  size: 20,
                },
                bodyAlign: 'left'
              }
            }
          }
        });
      new Chart(document.getElementById("chartTwo"), {
          type: 'bar',
          data: {
            labels: ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],
            datasets: [{ 
              data: [null,null,null,null,29.6,40.9,52.3,57.1,56.1,13.4,16.7,3.9],
              label: "mm",
              borderColor: "blue",
              backgroundColor: "blue",
              fill: false
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            x: {
              display: true,
              title: {
                display: true,
                text: 'Monthly',
                color: '#911',
                font: {
                  family: 'Comic Sans MS',
                  size: 20,
                  weight: 'bold',
                  lineHeight: 1.2,
                },
                padding: {top: 20, left: 0, right: 0, bottom: 0}
              }
            },
            y: {
              display: true,
              title: {
                display: true,
                text: 'Millimeters',
                color: '#911',
                font: {
                  family: 'Comic Sans MS',
                  size: 20,
                  weight: 'bold',
                  lineHeight: 1.2
                }
              }
            }
          },
          interaction: {
            intersect: false,
            mode: 'index',
          },
          plugins:{
            title: {
              display: true,
              text: 'Monthly 2018 Rain Fall (in Millimeters)',
              color: 'black',
              font: {
                family: 'Comic Sans MS',
                size: 20,
                weight: 'bold',
                lineHeight: 1.2,
              }
            },
            tooltip: {
              titleFont: {
                size: 20,
              },
              bodyFont: {
                size: 20,
              },
              bodyAlign: 'left'
            }
          }
        }
      });
      new Chart(document.getElementById("chartthree"), {
          type: 'bar',
          data: {
            labels: ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],
            datasets: [{ 
              data: [null,null,null,null,6,8,10,12,15,6,8,3],
              label: "Day",
              borderColor: "#570185",
              backgroundColor: "#570185",
              fill: false
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            x: {
              display: true,
              title: {
                display: true,
                text: 'Monthly',
                color: '#911',
                font: {
                  family: 'Comic Sans MS',
                  size: 20,
                  weight: 'bold',
                  lineHeight: 1.2,
                },
                padding: {top: 20, left: 0, right: 0, bottom: 0}
              }
            },
            y: {
              display: true,
              title: {
                display: true,
                text: 'Day',
                color: '#911',
                font: {
                  family: 'Comic Sans MS',
                  size: 20,
                  weight: 'bold',
                  lineHeight: 1.2
                }
              }
            }
          },
          interaction: {
            intersect: false,
            mode: 'index',
          },
          plugins:{
            title: {
              display: true,
              text: 'Count Day of Monthly',
              color: 'black',
              font: {
                family: 'Comic Sans MS',
                size: 20,
                weight: 'bold',
                lineHeight: 1.2,
              }
            },
            tooltip: {
              titleFont: {
                size: 20,
              },
              bodyFont: {
                size: 20,
              },
              bodyAlign: 'left'
            }
          }
        }
      });
      </script>
      </table>
