<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    table, th, td {
      border: 1px solid black;
      border-collapse: collapse;
    }
    
    tr:nth-child(even) {
      background-color: rgba(150, 212, 212, 0.4);
    }
    .container {
      width: 100%;
    }

    .row {
      display: flex;
      width: 100%;
    }
    
    .chart-container {
      width: 100%;
      height: 480px;
      border: 1px solid black;   /* 👈 border here */
      padding: 10px;             /* space inside border */
      box-sizing: border-box;    /* keeps width clean */
      background-color: #fff;    /* optional */
    }
    .chart-container.half {
      width: 50%;
      border: 1px solid black;   /* 👈 border here */
      padding: 10px;             /* space inside border */
      box-sizing: border-box;    /* keeps width clean */
      background-color: #fff;    /* optional */
    }
    </style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <script src="../Chart.js/4.5.1/dist/chart.umd.js"></script>
  <title>Year 2014 Rain Fall</title>
</head>
<body>
  <table>
    <tbody>
      <table style="width: 100%; font-size:20px;">
        <div class="row">
          <div class="chart-container">
            <canvas id="chartOne"></canvas>
          </div>
        </div>
        <div class="row">
          <div class="chart-container half">
            <canvas id="chartTwo"></canvas>
          </div>
          <div class="chart-container half">
            <canvas id="chartthree"></canvas>
          </div>
        </div>
        <script>
        new Chart(document.getElementById("chartOne"), {
          type: 'bar',
          data: {
            labels: ["July 10","July 17","July 19","July 20","July 22","July 24","July 25","July 26","July 30","August 2","August 6","August 7","August 8","August 9","August 19","August 20","August 27","August 28","August 30","September 1","September 3","September 4","September 7","September 8","September 9","September 10","September 11","September 12","September 19","September 26","September 30","October 1","October 4","October 6","October 7","October 8","October 15","October 21","October 26","October 27","November 1","November 4","November 6","November 17","November 20","November 22","November 24","December 3","December 7","December 9","December 10","December 13"],
            datasets: [{
              data: [4,16.3,6.1,2.2,0.9,0.7,39.3,1.1,1.6,1.5,0.6,0.5,0.9,0.5,1.3,1.1,4.5,0.7,3.3,1.6,3.2,0.5,2.8,8,1,1.7,0.5,2.5,3.2,7.7,1.4,0.6,0.6,0.6,1.2,3,4.3,0.8,1.3,0.9,0.6,0.5,1,0.9,4.3,0.6,2.7,1.1,1.4,0.8,0.5,0.6],
              label: "mm",
              borderColor: "#428df5",
               backgroundColor: "#428df5",
              fill: false
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              x: {
                display: true,
                title: {
                  display: true,
                  text: 'Date',
                  color: '#911',
                  font: {
                    family: 'Comic Sans MS',
                    size: 20,
                    weight: 'bold',
                    lineHeight: 1.2,
                  },
                  padding: {top: 20, left: 0, right: 0, bottom: 0}
                }
              },
              y: {
                display: true,
                title: {
                  display: true,
                  text: 'Millimeters',
                  color: '#911',
                  font: {
                    family: 'Comic Sans MS',
                    size: 20,
                    weight: 'bold',
                    lineHeight: 1.2
                  }
                }
              }
            },
            interaction: {
              intersect: false,
              mode: 'index',
            },
            plugins:{
              title: {
                display: true,
                text: 'Daily 2014 Rain Fall (in Millimeters)',
                color: 'black',
                font: {
                  family: 'Comic Sans MS',
                  size: 20,
                  weight: 'bold',
                  lineHeight: 1.2,
                }
              },
              tooltip: {
                titleFont: {
                  size: 20,
                },
                bodyFont: {
                  size: 20,
                },
                bodyAlign: 'left'
              }
            }
          }
        });
      new Chart(document.getElementById("chartTwo"), {
          type: 'bar',
          data: {
            labels: ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],
            datasets: [{ 
              data: [null,null,null,null,null,null,73.5,15.9,35.8,13.7,12.2,5],
              label: "mm",
              borderColor: "blue",
              backgroundColor: "blue",
              fill: false
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            x: {
              display: true,
              title: {
                display: true,
                text: 'Monthly',
                color: '#911',
                font: {
                  family: 'Comic Sans MS',
                  size: 20,
                  weight: 'bold',
                  lineHeight: 1.2,
                },
                padding: {top: 20, left: 0, right: 0, bottom: 0}
              }
            },
            y: {
              display: true,
              title: {
                display: true,
                text: 'Millimeters',
                color: '#911',
                font: {
                  family: 'Comic Sans MS',
                  size: 20,
                  weight: 'bold',
                  lineHeight: 1.2
                }
              }
            }
          },
          interaction: {
            intersect: false,
            mode: 'index',
          },
          plugins:{
            title: {
              display: true,
              text: 'Monthly 2014 Rain Fall (in Millimeters)',
              color: 'black',
              font: {
                family: 'Comic Sans MS',
                size: 20,
                weight: 'bold',
                lineHeight: 1.2,
              }
            },
            tooltip: {
              titleFont: {
                size: 20,
              },
              bodyFont: {
                size: 20,
              },
              bodyAlign: 'left'
            }
          }
        }
      });
      new Chart(document.getElementById("chartthree"), {
          type: 'bar',
          data: {
            labels: ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],
            datasets: [{ 
              data: [null,null,null,null,null,null,13,13,17,10,12,7],
              label: "Day",
              borderColor: "#570185",
              backgroundColor: "#570185",
              fill: false
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            x: {
              display: true,
              title: {
                display: true,
                text: 'Monthly',
                color: '#911',
                font: {
                  family: 'Comic Sans MS',
                  size: 20,
                  weight: 'bold',
                  lineHeight: 1.2,
                },
                padding: {top: 20, left: 0, right: 0, bottom: 0}
              }
            },
            y: {
              display: true,
              title: {
                display: true,
                text: 'Day',
                color: '#911',
                font: {
                  family: 'Comic Sans MS',
                  size: 20,
                  weight: 'bold',
                  lineHeight: 1.2
                }
              }
            }
          },
          interaction: {
            intersect: false,
            mode: 'index',
          },
          plugins:{
            title: {
              display: true,
              text: 'Count Day of Monthly',
              color: 'black',
              font: {
                family: 'Comic Sans MS',
                size: 20,
                weight: 'bold',
                lineHeight: 1.2,
              }
            },
            tooltip: {
              titleFont: {
                size: 20,
              },
              bodyFont: {
                size: 20,
              },
              bodyAlign: 'left'
            }
          }
        }
      });
      </script>
      </table>

    </tbody>
  </table>
</body>
</html>
