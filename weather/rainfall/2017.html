<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    table, th, td {
      border: 1px solid black;
      border-collapse: collapse;
    }
    
    tr:nth-child(even) {
      background-color: rgba(150, 212, 212, 0.4);
    }
    .container {
      width: 100%;
    }

    .row {
      display: flex;
      width: 100%;
    }
    
    .chart-container {
      width: 100%;
      height: 480px;
      border: 1px solid black;   /* 👈 border here */
      padding: 10px;             /* space inside border */
      box-sizing: border-box;    /* keeps width clean */
      background-color: #fff;    /* optional */
    }
    .chart-container.half {
      width: 50%;
      border: 1px solid black;   /* 👈 border here */
      padding: 10px;             /* space inside border */
      box-sizing: border-box;    /* keeps width clean */
      background-color: #fff;    /* optional */
    }
    </style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <script src="../Chart.js/4.5.1/dist/chart.umd.js"></script>
  <title>Year 2017 Rain Fall</title>
</head>
<body>
  <table>
    <tbody>
      <table style="width: 100%; font-size:20px;">
        <div class="row">
          <div class="chart-container">
            <canvas id="chartOne"></canvas>
          </div>
        </div>
        <div class="row">
          <div class="chart-container half">
            <canvas id="chartTwo"></canvas>
          </div>
          <div class="chart-container half">
            <canvas id="chartthree"></canvas>
          </div>
        </div>
        <script>
        new Chart(document.getElementById("chartOne"), {
          type: 'bar',
          data: {
            labels: ["Jan 15","Feb 11","Feb 19","Feb 20","Mar 14","Mar 16","Mar 19","Apr 1","Apr 3","Apr 7","Apr 8","Apr 10","Apr 13","Apr 14","Apr 15","Apr 16","Apr 18","Apr 22","Apr 23","Apr 24","May 6","May 12","May 13","May 14","May 15","May 19","May 24","May 31","June 2","June 5","June 9","June 10","June 13","June 14","June 16","June 20","June 22","June 28","July 1","July 3","July 8","July 9","July 11","July 13","July 16","July 20","July 21","July 23","July 24","July 27","July 29","Aug 1","Aug 3","Aug 4","Aug 5","Aug 7","Aug 13","Aug 14","Aug 18","Aug 19","Aug 24","Sept 3","Sept 10"],
            datasets: [{
              data: [2.3,2.4,7.8,0.7,3.9,1.7,0.5,0.5,3.1,12,5.1,1.1,6,6.8,3.6,3.8,2.6,2.4,4.8,2.2,3.5,3.8,4.8,1.1,7.9,1.3,40.6,0.5,8.7,1.8,11.7,6.5,1.5,5.6,1.7,4.1,2.6,9.1,3.7,1.8,1.1,0.9,1.8,8.7,3.3,15,1.1,4,10.1,10.7,2.6,5.8,1.9,12.3,0.9,3.2,10.6,0.5,1.3,0.8,2.5,0.6,1],
              label: "mm",
              borderColor: "#428df5",
               backgroundColor: "#428df5",
              fill: false
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              x: {
                display: true,
                title: {
                  display: true,
                  text: 'Date',
                  color: '#911',
                  font: {
                    family: 'Comic Sans MS',
                    size: 20,
                    weight: 'bold',
                    lineHeight: 1.2,
                  },
                  padding: {top: 20, left: 0, right: 0, bottom: 0}
                }
              },
              y: {
                display: true,
                title: {
                  display: true,
                  text: 'Millimeters',
                  color: '#911',
                  font: {
                    family: 'Comic Sans MS',
                    size: 20,
                    weight: 'bold',
                    lineHeight: 1.2
                  }
                }
              }
            },
            interaction: {
              intersect: false,
              mode: 'index',
            },
            plugins:{
              title: {
                display: true,
                text: 'Daily 2017 Rain Fall (in Millimeters)',
                color: 'black',
                font: {
                  family: 'Comic Sans MS',
                  size: 20,
                  weight: 'bold',
                  lineHeight: 1.2,
                }
              },
              tooltip: {
                titleFont: {
                  size: 20,
                },
                bodyFont: {
                  size: 20,
                },
                bodyAlign: 'left'
              }
            }
          }
        });
      new Chart(document.getElementById("chartTwo"), {
          type: 'bar',
          data: {
            labels: ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],
            datasets: [{ 
              data: [2.3,10.9,6.1,54.6,63.8,53.7,65.1,40.2,2.3,null,null,null],
              label: "mm",
              borderColor: "blue",
              backgroundColor: "blue",
              fill: false
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            x: {
              display: true,
              title: {
                display: true,
                text: 'Monthly',
                color: '#911',
                font: {
                  family: 'Comic Sans MS',
                  size: 20,
                  weight: 'bold',
                  lineHeight: 1.2,
                },
                padding: {top: 20, left: 0, right: 0, bottom: 0}
              }
            },
            y: {
              display: true,
              title: {
                display: true,
                text: 'Millimeters',
                color: '#911',
                font: {
                  family: 'Comic Sans MS',
                  size: 20,
                  weight: 'bold',
                  lineHeight: 1.2
                }
              }
            }
          },
          interaction: {
            intersect: false,
            mode: 'index',
          },
          plugins:{
            title: {
              display: true,
              text: 'Monthly 2017 Rain Fall (in Millimeters)',
              color: 'black',
              font: {
                family: 'Comic Sans MS',
                size: 20,
                weight: 'bold',
                lineHeight: 1.2,
              }
            },
            tooltip: {
              titleFont: {
                size: 20,
              },
              bodyFont: {
                size: 20,
              },
              bodyAlign: 'left'
            }
          }
        }
      });
      new Chart(document.getElementById("chartthree"), {
          type: 'bar',
          data: {
            labels: ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],
            datasets: [{ 
              data: [1,3,3,15,9,11,14,11,4,null,null,null],
              label: "Day",
              borderColor: "#570185",
              backgroundColor: "#570185",
              fill: false
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            x: {
              display: true,
              title: {
                display: true,
                text: 'Monthly',
                color: '#911',
                font: {
                  family: 'Comic Sans MS',
                  size: 20,
                  weight: 'bold',
                  lineHeight: 1.2,
                },
                padding: {top: 20, left: 0, right: 0, bottom: 0}
              }
            },
            y: {
              display: true,
              title: {
                display: true,
                text: 'Day',
                color: '#911',
                font: {
                  family: 'Comic Sans MS',
                  size: 20,
                  weight: 'bold',
                  lineHeight: 1.2
                }
              }
            }
          },
          interaction: {
            intersect: false,
            mode: 'index',
          },
          plugins:{
            title: {
              display: true,
              text: 'Count Day of Monthly',
              color: 'black',
              font: {
                family: 'Comic Sans MS',
                size: 20,
                weight: 'bold',
                lineHeight: 1.2,
              }
            },
            tooltip: {
              titleFont: {
                size: 20,
              },
              bodyFont: {
                size: 20,
              },
              bodyAlign: 'left'
            }
          }
        }
      });
      </script>
      </table>
