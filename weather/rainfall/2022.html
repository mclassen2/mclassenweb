<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    table, th, td {
      border: 1px solid black;
      border-collapse: collapse;
    }
    
    tr:nth-child(even) {
      background-color: rgba(150, 212, 212, 0.4);
    }
    .container {
      width: 100%;
    }

    .row {
      display: flex;
      width: 100%;
    }
    
    .chart-container {
      width: 100%;
      height: 480px;
      border: 1px solid black;   /* 👈 border here */
      padding: 10px;             /* space inside border */
      box-sizing: border-box;    /* keeps width clean */
      background-color: #fff;    /* optional */
    }
    .chart-container.half {
      width: 50%;
      border: 1px solid black;   /* 👈 border here */
      padding: 10px;             /* space inside border */
      box-sizing: border-box;    /* keeps width clean */
      background-color: #fff;    /* optional */
    }
    </style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <script src="../Chart.js/4.5.1/dist/chart.umd.js"></script>
  <title>Year 2022 Rain Fall</title>
</head>
<body>
  <table>
    <tbody>
      <table style="width: 100%; font-size:20px;">
        <div class="row">
          <div class="chart-container">
            <canvas id="chartOne"></canvas>
          </div>
        </div>
        <div class="row">
          <div class="chart-container half">
            <canvas id="chartTwo"></canvas>
          </div>
          <div class="chart-container half">
            <canvas id="chartthree"></canvas>
          </div>
        </div>
        <script>
        new Chart(document.getElementById("chartOne"), {
          type: 'bar',
          data: {
            labels: ["January 11","January 15","January 17","January 20","January 26","February 5","February 17","February 25","March 7","March 20","March 26","March 31","April 19","April 20","April 26","April 27","May 1","May 6","May 18","May 19","May 24","May 27","May 29","June 6","June 7","June 8","June 12","June 13","June 14","June 15","June 17","June 18","June 19","June 21","June 22","June 23","June 24","June 28","June 29","July 2","July 5","July 6","July 8","July 9","July 17","July 18","July 19","July 21","July 22","July 29","August 1","August 4","August 5","August 8","August 13","August 16","August 27","September 5","September 7","September 8","September 15","September 19","October 5","October 10","October 20","October 28","November 4","November 12","November 20"],
            datasets: [{
              data: [4.5,0.5,1.5,4.1,1.3,2.8,5.3,0.7,0.5,3.8,5.6,0.5,1.5,2.5,1.5,15.5,1,7.9,4.4,13.9,2.6,0.5,0.7,12,3.8,1.8,0.7,2.1,43.1,16.2,9.7,1,0.5,2.6,11.1,34.5,4.1,3.6,1.5,15.3,64.8,1.8,0.5,3.3,1,0.5,5.1,2.5,1.3,2,3,3.3,1.5,0.8,3.8,0.5,1.8,1.6,4.3,2.3,5.8,3.3,0.5,1.2,1.3,1.3,1.5,0.5,0.5],
              label: "mm",
              borderColor: "#428df5",
               backgroundColor: "#428df5",
              fill: false
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              x: {
                display: true,
                title: {
                  display: true,
                  text: 'Date',
                  color: '#911',
                  font: {
                    family: 'Comic Sans MS',
                    size: 20,
                    weight: 'bold',
                    lineHeight: 1.2,
                  },
                  padding: {top: 20, left: 0, right: 0, bottom: 0}
                }
              },
              y: {
                display: true,
                title: {
                  display: true,
                  text: 'Millimeters',
                  color: '#911',
                  font: {
                    family: 'Comic Sans MS',
                    size: 20,
                    weight: 'bold',
                    lineHeight: 1.2
                  }
                }
              }
            },
            interaction: {
              intersect: false,
              mode: 'index',
            },
            plugins:{
              title: {
                display: true,
                text: 'Daily 2022 Rain Fall (in Millimeters)',
                color: 'black',
                font: {
                  family: 'Comic Sans MS',
                  size: 20,
                  weight: 'bold',
                  lineHeight: 1.2,
                }
              },
              tooltip: {
                titleFont: {
                  size: 20,
                },
                bodyFont: {
                  size: 20,
                },
                bodyAlign: 'left'
              }
            }
          }
        });
      new Chart(document.getElementById("chartTwo"), {
          type: 'bar',
          data: {
            labels: ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],
            datasets: [{ 
              data: [14.7,6.6,6.3,21.6,31.2,148.5,98.6,15.2,17.6,4.3,3.3,0],
              label: "mm",
              borderColor: "blue",
              backgroundColor: "blue",
              fill: false
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            x: {
              display: true,
              title: {
                display: true,
                text: 'Monthly',
                color: '#911',
                font: {
                  family: 'Comic Sans MS',
                  size: 20,
                  weight: 'bold',
                  lineHeight: 1.2,
                },
                padding: {top: 20, left: 0, right: 0, bottom: 0}
              }
            },
            y: {
              display: true,
              title: {
                display: true,
                text: 'Millimeters',
                color: '#911',
                font: {
                  family: 'Comic Sans MS',
                  size: 20,
                  weight: 'bold',
                  lineHeight: 1.2
                }
              }
            }
          },
          interaction: {
            intersect: false,
            mode: 'index',
          },
          plugins:{
            title: {
              display: true,
              text: 'Monthly 2022 Rain Fall (in Millimeters)',
              color: 'black',
              font: {
                family: 'Comic Sans MS',
                size: 20,
                weight: 'bold',
                lineHeight: 1.2,
              }
            },
            tooltip: {
              titleFont: {
                size: 20,
              },
              bodyFont: {
                size: 20,
              },
              bodyAlign: 'left'
            }
          }
        }
      });
      new Chart(document.getElementById("chartthree"), {
          type: 'bar',
          data: {
            labels: ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],
            datasets: [{ 
              data: [8,6,7,6,8,17,13,9,6,4,6,0],
              label: "Day",
              borderColor: "#570185",
              backgroundColor: "#570185",
              fill: false
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            x: {
              display: true,
              title: {
                display: true,
                text: 'Monthly',
                color: '#911',
                font: {
                  family: 'Comic Sans MS',
                  size: 20,
                  weight: 'bold',
                  lineHeight: 1.2,
                },
                padding: {top: 20, left: 0, right: 0, bottom: 0}
              }
            },
            y: {
              display: true,
              title: {
                display: true,
                text: 'Day',
                color: '#911',
                font: {
                  family: 'Comic Sans MS',
                  size: 20,
                  weight: 'bold',
                  lineHeight: 1.2
                }
              }
            }
          },
          interaction: {
            intersect: false,
            mode: 'index',
          },
          plugins:{
            title: {
              display: true,
              text: 'Count Day of Monthly',
              color: 'black',
              font: {
                family: 'Comic Sans MS',
                size: 20,
                weight: 'bold',
                lineHeight: 1.2,
              }
            },
            tooltip: {
              titleFont: {
                size: 20,
              },
              bodyFont: {
                size: 20,
              },
              bodyAlign: 'left'
            }
          }
        }
      });
      </script>
