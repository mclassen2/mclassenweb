<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    table, th, td {
      border: 1px solid black;
      border-collapse: collapse;
    }
    
    tr:nth-child(even) {
      background-color: rgba(150, 212, 212, 0.4);
    }
    .container {
      width: 100%;
    }

    .row {
      display: flex;
      width: 100%;
    }
    
    .chart-container {
      width: 100%;
      height: 480px;
      border: 1px solid black;   /* 👈 border here */
      padding: 10px;             /* space inside border */
      box-sizing: border-box;    /* keeps width clean */
      background-color: #fff;    /* optional */
    }
    .chart-container.half {
      width: 50%;
      border: 1px solid black;   /* 👈 border here */
      padding: 10px;             /* space inside border */
      box-sizing: border-box;    /* keeps width clean */
      background-color: #fff;    /* optional */
    }
    </style>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <script src="../Chart.js/4.5.1/dist/chart.umd.js"></script>
  <title>Year 2025 Rain Fall</title>
</head>

  <table>
    <tbody>
      <table style="width: 100%; font-size:20px;">
        <div class="row">
          <div class="chart-container">
            <canvas id="chartOne"></canvas>
          </div>
        </div>
        <div class="row">
          <div class="chart-container half">
            <canvas id="chartTwo"></canvas>
          </div>
          <div class="chart-container half">
            <canvas id="chartthree"></canvas>
          </div>
        </div>

              label: "mm",
              borderColor: "#428df5",
               backgroundColor: "#428df5",
              fill: false
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              x: {
                display: true,
                title: {
                  display: true,
                  text: 'Date',
                  color: '#911',
                  font: {
                    family: 'Comic Sans MS',
                    size: 20,
                    weight: 'bold',
                    lineHeight: 1.2,
                  },
                  padding: {top: 20, left: 0, right: 0, bottom: 0}
                }
              },
              y: {
                display: true,
                title: {
                  display: true,
                  text: 'Millimeters',
                  color: '#911',
                  font: {
                    family: 'Comic Sans MS',
                    size: 20,
                    weight: 'bold',
                    lineHeight: 1.2
                  }
                }
              }

            interaction: {
              intersect: false,
              mode: 'index',

            plugins:{

                display: true,

                color: 'black',
                font: {
                  family: 'Comic Sans MS',
                  size: 20,
                  weight: 'bold',

                }

                titleFont: {
                  size: 20,
                },
                bodyFont: {
                  size: 20,
                },
                bodyAlign: 'left'

            }
          }
        });

                  size: 20,
                  weight: 'bold',

                padding: {top: 20, left: 0, right: 0, bottom: 0}

            },
            y: {

                  size: 20,
                  weight: 'bold',

                }
              }
            }

          interaction: {
            intersect: false,
            mode: 'index',

            },
            tooltip: {
              titleFont: {
                size: 20,
              },
              bodyFont: {
                size: 20,
              },
              bodyAlign: 'left'
            }
          }
        }
      });
      new Chart(document.getElementById("chartthree"), {
          type: 'bar',

        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            x: {
              display: true,
              title: {
                display: true,
                text: 'Monthly',
                color: '#911',
                font: {
                  family: 'Comic Sans MS',
                  size: 20,

            intersect: false,

          },
          plugins:{
