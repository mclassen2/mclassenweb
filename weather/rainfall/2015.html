<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    table, th, td {
      border: 1px solid black;
      border-collapse: collapse;
    }
    
    tr:nth-child(even) {

    }
    .container {
      width: 100%;

    .row {
      display: flex;
      width: 100%;

    .chart-container {

      padding: 10px;             /* space inside border */

      background-color: #fff;    /* optional */
    }
    .chart-container.half {
      width: 50%;
      border: 1px solid black;   /* 👈 border here */

      background-color: #fff;    /* optional */
